<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDA - 잇다</title>
    <link rel="icon" href="./favicon.png">
    <style>
        :root { --bg-color: #111; --card-bg: #1a1a1a; --accent: #1d3557; --text: #eee; }
        body { margin: 0; background: var(--bg-color); color: var(--text); font-family: 'Pretendard', sans-serif; line-height: 1.6; }
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; 
        position: sticky;
        top: 0;
        z-index: 100;}
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; cursor: pointer; }
        .left-menu { display: flex; gap: 20px; margin-left: 30px; }
        .left-menu span { cursor: pointer; color: #aaa; transition: 0.3s; }
        .left-menu span:hover, .left-menu span.active { color: white; font-weight: bold; }
        .notice { font-size: 12px; color: #666; text-align: right; max-width: 300px; }
        
        .container { width: 90%; max-width: 800px; margin: 20px auto; padding-bottom: 100px; }
        .post { background: var(--card-bg); padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #333; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .nick { color: #888; font-size: 13px; }
        .content { white-space: pre-wrap; margin: 15px 0; }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        button { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #444; }
        .btn-like { background: #e63946; }
        .btn-dislike { background: #457b9d; }

        .comment-section { background: #151515; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .comment { font-size: 14px; border-bottom: 1px solid #222; padding: 8px 0; }
        .comment-input-group { display: flex; gap: 5px; margin-top: 10px; }
        .comment-input-group input { flex: 1; background: #222; border: 1px solid #333; color: white; padding: 8px; border-radius: 4px; }

        .write-btn { position: fixed; right: 30px; bottom: 30px; width: 60px; height: 60px; border-radius: 50%; background: #007bff; color: white; font-size: 30px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
        .modal input, .modal textarea { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 10px; margin: 10px 0; box-sizing: border-box; border-radius: 5px; }
        .modal textarea { height: 150px; resize: none; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center;">
        <div class="logo" onclick="location.reload()">ITDA</div>
        <div class="left-menu">
            <span id="menu-home" onclick="changeMode('home')">홈</span>
            <span id="menu-best" onclick="changeMode('best')">실베</span>
        </div>
    </div>
    <div class="notice">운영자: 신가람 / 부적절한 게시물은 예고 없이 삭제될 수 있습니다.</div>
</header>

<div class="container" id="postsContainer"></div>

<button class="write-btn" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>새 글 작성</h3>
        <input id="title" placeholder="제목을 입력하세요">
        <textarea id="content" placeholder="내용을 입력하세요"></textarea>
        <button style="width: 100%; padding: 12px; background: #007bff;" onclick="addPost()">등록하기</button>
    </div>
</div>

<script>

    function formatTime(timestamp){
        const d = new Date(timestamp);
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const day = String(d.getDate()).padStart(2,'0');
        const h = String(d.getHours()).padStart(2,'0');
        const min = String(d.getMinutes()).padStart(2,'0');
        return `${y}.${m}.${day} ${h}:${min}`;
    }

    function deletePost(id){
        posts = posts.filter(p => p.id !== id);
        save();
        render();
    }

    // --- 초기 설정 ---
    let mode = "home";
    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    let voted = JSON.parse(localStorage.getItem("voted")) || {};
    
    // IP 생성 (보안상 실제 IP는 서버 없이 가져올 수 없으므로 유지)
    if(!localStorage.getItem("userIP")){
        const fakeIP = `${Math.floor(Math.random()*254+1)}.${Math.floor(Math.random()*254+1)}`;
        localStorage.setItem("userIP", fakeIP);
    }
    const userIP = localStorage.getItem("userIP");

    // --- 보안 함수 (XSS 방지) ---
    function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>"']/g, function(m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
        });
    }

    // --- 기능 함수 ---
    function save() {
        localStorage.setItem("posts", JSON.stringify(posts));
        localStorage.setItem("voted", JSON.stringify(voted));
    }

    function openModal() { document.getElementById("modalOverlay").style.display = "block"; }
    function closeModal(e) { document.getElementById("modalOverlay").style.display = "none"; }

    function addPost() {
        const title = document.getElementById("title").value.trim();
        const content = document.getElementById("content").value.trim();
        
        if(!title || !content) return alert("내용을 입력해주세요.");

        posts.unshift({
            id: Date.now(), // 고유 ID 부여
            title,
            content,
            nick: localStorage.getItem("isAdmin") ? "운영자" : `ㅇㅇ(${userIP})`,
            likes: 0,
            dislikes: 0,
            comments: [],
            time: Date.now()
        });

        save();
        render();
        document.getElementById("title").value = "";
        document.getElementById("content").value = "";
        closeModal();
    }

    function vote(id, type) {
        if(voted[id]) return alert("이미 참여하셨습니다.");
        const post = posts.find(p => p.id === id);
        if(type === 'up') post.likes++;
        else post.dislikes++;
        voted[id] = true;
        save();
        render();
    }

    function addComment(id) {
        const input = document.getElementById(`commentInput-${id}`);
        const text = input.value.trim();
        if(!text) return;

        const post = posts.find(p => p.id === id);
        post.comments.push({
            text,
            nick: localStorage.getItem("isAdmin") ? "운영자" : `ㅇㅇ(${userIP})`
        });
        
        save();
        render();
    }

    function changeMode(m) {
        mode = m;
        render();
    }

    // --- 렌더링 함수 ---
    function render() {
        const container = document.getElementById("postsContainer");
        container.innerHTML = "";

        // 메뉴 활성화 표시
        document.getElementById("menu-home").className = mode === 'home' ? 'active' : '';
        document.getElementById("menu-best").className = mode === 'best' ? 'active' : '';

        const displayPosts = mode === "best" ? posts.filter(p => p.likes >= 10) : posts;

        displayPosts.forEach((post) => {
            const postEl = document.createElement("div");
            postEl.className = "post";
            if(post.likes >= 10) postEl.style.background = "#1b2d45";
            postEl.innerHTML = `
                <div class="post-header">
                    <strong style="font-size:18px">${escapeHTML(post.title)}</strong>
                    <div style="text-align:right;">
                        <div class="nick" style="color:${post.nick==='운영자'?'orange':'#888'}">${post.nick}</div>
                        <div style="font-size:11px;color:#666">${formatTime(post.time)}</div>
                    </div>
                </div>
                <div class="content">${escapeHTML(post.content)}</div>
                <div class="actions">
                    <button class="btn-like" onclick="vote(${post.id}, 'up')">추천 ${post.likes}</button>
                    <button class="btn-dislike" onclick="vote(${post.id}, 'down')">비추 ${post.dislikes}</button>
                    ${localStorage.getItem("isAdmin") ? `<button onclick="deletePost(${post.id})">삭제</button>` : ""}
                </div>
                <div class="comment-section">
                    ${post.comments.map(c => `
                        <div class="comment">
                            <strong style="color:${c.nick==='운영자'?'orange':'white'}">${c.nick}</strong> : ${escapeHTML(c.text)}
                        </div>
                    `).join('')}
                    <div class="comment-input-group">
                        <input id="commentInput-${post.id}" placeholder="댓글을 입력하세요...">
                        <button onclick="addComment(${post.id})">등록</button>
                    </div>
                </div>
            `;
            container.appendChild(postEl);
        });

        if(displayPosts.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:#666; margin-top:50px;">게시물이 없습니다.</p>`;
        }
    }

    // 초기 실행
    render();
</script>

</body>
</html>
