<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITDA - 잇다</title>
<link rel="icon" href="./favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --card: #161616;
  --card-hover: #1c1c1c;
  --border: #252525;
  --border-light: #2e2e2e;
  --text: #e8e8e8;
  --text-muted: #666;
  --text-dim: #444;
  --accent: #ff4d00;
  --blue: #3b82f6;
  --green: #22c55e;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 5%;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 500;
}

.logo {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.4; transform:scale(.75); }
}

nav { display: flex; gap: 4px; margin-left: 20px; }

.nav-btn {
  font-family: var(--sans);
  font-size: 13px;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .2s;
}
.nav-btn:hover  { color: var(--text); border-color: var(--border-light); }
.nav-btn.active { color: var(--text); background: var(--border); border-color: var(--border-light); }

.op-info {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

/* ── Layout ── */
.container {
  width: 90%;
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 0 100px;
}

/* ── Post Card ── */
.post {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 10px;
  transition: border-color .2s, background .2s;
  animation: fadeUp .25s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.post:hover { border-color: var(--border-light); background: var(--card-hover); }

.post-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.post-title { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.4; }

.nickname {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.nickname.op {
  color: #f59e0b;
  background: rgba(245,158,11,.08);
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid rgba(245,158,11,.2);
}

.post-content {
  font-size: 14px;
  color: #bbb;
  white-space: pre-wrap;
  line-height: 1.75;
  margin-bottom: 14px;
  word-break: break-word;
}

/* ── Actions ── */
.actions { display: flex; align-items: center; gap: 8px; }

.vote-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all .2s;
}
.vote-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
.vote-btn:disabled { opacity: .4; cursor: not-allowed; }
.vote-btn.up:hover:not(:disabled)   { border-color:#ef4444; color:#ef4444; background:rgba(239,68,68,.08); }
.vote-btn.down:hover:not(:disabled) { border-color:var(--blue); color:var(--blue); background:rgba(59,130,246,.08); }
.vote-btn.voted-up   { border-color:#ef4444; color:#ef4444; background:rgba(239,68,68,.1); }
.vote-btn.voted-down { border-color:var(--blue); color:var(--blue); background:rgba(59,130,246,.1); }

.delete-btn {
  margin-left: auto;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid rgba(239,68,68,.3);
  background: transparent;
  color: rgba(239,68,68,.6);
  font-size: 12px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all .2s;
}
.delete-btn:hover { background: rgba(239,68,68,.1); color:#ef4444; border-color:#ef4444; }

/* ── Comments ── */
.comments-section { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }

.comment-item {
  display: flex;
  gap: 10px;
  font-size: 13px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.comment-item:last-child { border-bottom: none; }

.comment-nick { font-family: var(--mono); font-size: 11px; color: var(--text-muted); flex-shrink: 0; min-width: 80px; }
.comment-nick.op { color: #f59e0b; }
.comment-text { color: #bbb; flex: 1; word-break: break-word; }

.comment-row { display: flex; gap: 8px; margin-top: 12px; }

.comment-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.comment-row input:focus { border-color: var(--border-light); }
.comment-row input::placeholder { color: var(--text-dim); }

.comment-row button {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.comment-row button:hover { border-color: var(--accent); color: var(--accent); }

/* ── FAB ── */
.fab {
  position: fixed;
  right: 28px; bottom: 28px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 20px rgba(255,77,0,.4), 0 4px 14px rgba(0,0,0,.5);
  border: none;
  color: white;
  font-size: 26px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  display: flex; align-items: center; justify-content: center;
  z-index: 400;
}
.fab:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(255,77,0,.6), 0 6px 18px rgba(0,0,0,.5); }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(4px);
  z-index: 600;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 26px;
  width: 90%; max-width: 420px;
  animation: modalIn .2s ease;
}
@keyframes modalIn {
  from { opacity:0; transform:scale(.96) translateY(8px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.modal h3 {
  font-size: 15px; font-weight: 700;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.modal h3 span { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 2px; }

.modal input, .modal textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 13px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
  margin-bottom: 10px;
  display: block;
}
.modal input:focus, .modal textarea:focus { border-color: var(--border-light); }
.modal input::placeholder, .modal textarea::placeholder { color: var(--text-dim); }
.modal textarea { height: 160px; resize: none; line-height: 1.6; }

.char-count {
  font-size: 11px; color: var(--text-dim);
  text-align: right; margin-top: -6px; margin-bottom: 12px;
  font-family: var(--mono);
}
.char-count.warn { color: #f59e0b; }

.modal-actions { display: flex; gap: 8px; }

.btn-cancel {
  flex: 1; padding: 10px;
  border-radius: 8px; border: 1px solid var(--border-light);
  background: transparent; color: var(--text-muted);
  font-size: 14px; font-family: var(--sans); cursor: pointer; transition: all .2s;
}
.btn-cancel:hover { border-color: #555; color: var(--text); }

.btn-submit {
  flex: 2; padding: 10px;
  border-radius: 8px; border: none;
  background: var(--accent); color: white;
  font-size: 14px; font-weight: 700; font-family: var(--sans);
  cursor: pointer; transition: opacity .2s;
}
.btn-submit:hover:not(:disabled) { opacity: .85; }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: #1e1e1e;
  border: 1px solid var(--border-light);
  color: var(--text);
  padding: 9px 18px;
  border-radius: 8px; font-size: 13px;
  opacity: 0; transition: all .25s;
  z-index: 999; pointer-events: none; white-space: nowrap;
}
.toast.show  { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.error   { border-color:#ef4444; color:#ef4444; }
.toast.success { border-color:var(--green); color:var(--green); }

/* ── State ── */
.state-msg {
  text-align: center; color: var(--text-dim);
  font-size: 13px; padding: 60px 0;
  font-family: var(--mono); letter-spacing: 2px;
}

/* ── Best badge ── */
.best-badge {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  color: #f59e0b; background: rgba(245,158,11,.1);
  border: 1px solid rgba(245,158,11,.25);
  padding: 2px 6px; border-radius: 4px; margin-right: 4px;
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:4px;">
    <div class="logo" onclick="changeMode('home')">
      <div class="logo-dot"></div>
      ITDA
    </div>
    <nav>
      <button class="nav-btn active" id="btn-home" onclick="changeMode('home')">홈</button>
      <button class="nav-btn" id="btn-best" onclick="changeMode('best')">실베</button>
    </nav>
  </div>
  <div class="op-info">운영자: 신가람</div>
</header>

<div class="container" id="postsContainer">
  <div class="state-msg">불러오는 중...</div>
</div>

<button class="fab" onclick="openModal()">＋</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>새 글 작성 <span>NEW POST</span></h3>
    <input id="title" maxlength="80" placeholder="제목">
    <textarea id="content" maxlength="1000" placeholder="내용" oninput="updateCount()"></textarea>
    <div class="char-count" id="charCount">0 / 1000</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('modalOverlay').classList.remove('open')">취소</button>
      <button class="btn-submit" id="submitBtn" onclick="addPost()">등록하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if (location.hash === '#itda_owner_7841') {
  localStorage.setItem('isAdmin', '1');
}

const supabaseUrl = 'https://cnwdrfwnsxyfrtzvhwha.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNud2RyZnduc3h5ZnJ0enZod2hhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDg1MzgsImV4cCI6MjA5MDE4NDUzOH0.yX27wbbPTmLCipFk-WEPGFQoc8IP5mdegzZRN4b9J4g';
const { createClient } = supabase;
const db = createClient(supabaseUrl, supabaseKey);

let mode = 'home';
let voted = JSON.parse(localStorage.getItem('voted') || '{}');

if (!localStorage.getItem('userIP')) {
  localStorage.setItem('userIP', '익명' + Math.floor(Math.random() * 999999));
}
const userIP = localStorage.getItem('userIP');

let lastPostTime = 0;
let lastCommentTime = {};

function escapeHTML(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

function updateCount() {
  const c = (document.getElementById('content').value || '').length;
  const el = document.getElementById('charCount');
  el.textContent = c + ' / 1000';
  el.className = 'char-count' + (c > 900 ? ' warn' : '');
}

function openModal() {
  document.getElementById('title').value = '';
  document.getElementById('content').value = '';
  updateCount();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function changeMode(m) {
  mode = m;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  loadPosts();
}

async function addPost() {
  const title   = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();
  const btn     = document.getElementById('submitBtn');

  if (/[<>]/.test(title) || /[<>]/.test(content)) { showToast('특수문자 제한', 'error'); return; }
  if (!title || !content) { showToast('내용을 입력하세요', 'error'); return; }
  if (title.length > 80 || content.length > 1000) { showToast('글자수 초과', 'error'); return; }
  if (Date.now() - lastPostTime < 5000) {
    showToast(`${Math.ceil((5000-(Date.now()-lastPostTime))/1000)}초 후 작성 가능`, 'error'); return;
  }

  btn.disabled = true;
  lastPostTime = Date.now();

  const { error } = await db.from('posts').insert([{
    title, content,
    nickname: `ㅇㅇ(${userIP})`,
    likes: 0, dislikes: 0
  }]);

  btn.disabled = false;
  if (error) { showToast('등록 실패', 'error'); lastPostTime = 0; return; }

  document.getElementById('modalOverlay').classList.remove('open');
  showToast('등록되었습니다', 'success');
  loadPosts();
}

async function addComment(postId) {
  const input = document.getElementById(`comment-${postId}`);
  const text  = input.value.trim();

  if (!text) return;
  if (/[<>]/.test(text)) { showToast('특수문자 제한', 'error'); return; }
  if (text.length > 300) { showToast('300자 이내로 입력하세요', 'error'); return; }

  const last = lastCommentTime[postId] || 0;
  if (Date.now() - last < 3000) { showToast('잠시 후 댓글 작성 가능', 'error'); return; }

  lastCommentTime[postId] = Date.now();
  input.disabled = true;

  const { error } = await db.from('comments').insert([{
    post_id: postId, text,
    nickname: localStorage.getItem('isAdmin') ? '운영자' : `ㅇㅇ(${userIP})`
  }]);

  input.disabled = false;
  if (error) { showToast('댓글 실패', 'error'); lastCommentTime[postId] = 0; return; }
  input.value = '';
  loadPosts();
}

async function deletePost(id) {
  if (!localStorage.getItem('isAdmin')) return;
  if (!confirm('삭제하시겠습니까?')) return;
  await db.from('posts').delete().eq('id', id);
  showToast('삭제되었습니다');
  loadPosts();
}

async function vote(id, type) {
  if (voted[id]) { showToast('이미 참여했습니다'); return; }

  const { data, error } = await db.from('posts').select('likes,dislikes').eq('id', id).single();
  if (error || !data) { showToast('오류가 발생했습니다', 'error'); return; }

  const update = type === 'up'
    ? { likes: (data.likes||0)+1 }
    : { dislikes: (data.dislikes||0)+1 };

  const { error: uErr } = await db.from('posts').update(update).eq('id', id);
  if (uErr) { showToast('오류가 발생했습니다', 'error'); return; }

  voted[id] = type;
  localStorage.setItem('voted', JSON.stringify(voted));
  loadPosts();
}

async function loadPosts() {
  const container = document.getElementById('postsContainer');

  const { data, error } = await db
    .from('posts')
    .select('*, comments(id,text,nickname)')
    .order('id', { ascending: false });

  container.innerHTML = '';

  if (error) { container.innerHTML = '<div class="state-msg">불러오기 실패</div>'; return; }
  if (!data || data.length === 0) { container.innerHTML = '<div class="state-msg">게시글이 없습니다</div>'; return; }

  const posts = mode === 'best' ? data.filter(p => (p.likes||0) >= 10) : data;

  if (posts.length === 0) {
    container.innerHTML = '<div class="state-msg">실베 게시글이 없습니다 (추천 10 이상)</div>';
    return;
  }

  const isAdmin = !!localStorage.getItem('isAdmin');

  posts.forEach((post, i) => {
    const div = document.createElement('div');
    div.className = 'post';
    div.style.animationDelay = Math.min(i * 0.04, 0.3) + 's';

    const title  = escapeHTML(post.title);
    const cont   = escapeHTML(post.content);
    const nick   = escapeHTML(post.nickname);
    const isOp   = nick === '운영자';
    const vType  = voted[post.id];
    const isBest = (post.likes||0) >= 10;

    const comments = (post.comments||[]).map(c => {
      const cn = escapeHTML(c.nickname);
      const ct = escapeHTML(c.text);
      return `<div class="comment-item">
        <span class="comment-nick${cn==='운영자'?' op':''}">${cn}</span>
        <span class="comment-text">${ct}</span>
      </div>`;
    }).join('');

    div.innerHTML = `
      <div class="post-header">
        <div class="post-title">${isBest?'<span class="best-badge">BEST</span>':''}${title}</div>
        <span class="nickname${isOp?' op':''}">${nick}</span>
      </div>
      <div class="post-content">${cont}</div>
      <div class="actions">
        <button class="vote-btn up${vType==='up'?' voted-up':''}" onclick="vote(${post.id},'up')" ${vType?'disabled':''}>▲ ${post.likes||0}</button>
        <button class="vote-btn down${vType==='down'?' voted-down':''}" onclick="vote(${post.id},'down')" ${vType?'disabled':''}>▼ ${post.dislikes||0}</button>
        ${isAdmin ? `<button class="delete-btn" onclick="deletePost(${post.id})">삭제</button>` : ''}
      </div>
      ${comments ? `<div class="comments-section">${comments}</div>` : ''}
      <div class="comment-row">
        <input id="comment-${post.id}" placeholder="댓글을 입력하세요" maxlength="300"
          onkeydown="if(event.key==='Enter')addComment(${post.id})">
        <button onclick="addComment(${post.id})">등록</button>
      </div>
    `;

    container.appendChild(div);
  });
}

loadPosts();
</script>
</body>
</html>
