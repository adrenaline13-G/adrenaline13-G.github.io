<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITDA - 잇다</title>
<link rel="icon" href="./favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
    --bg:#111;
    --card:#1a1a1a;
    --text:#eee;
    --line:#333;
    --accent:#007bff;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:sans-serif;
}

header{
    background:#000;
    padding:15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:100;
    border-bottom:1px solid var(--line);
}

.logo{
    font-size:24px;
    font-weight:900;
    cursor:pointer;
}

.left-menu{
    display:flex;
    gap:20px;
    margin-left:20px;
}

.left-menu span{
    cursor:pointer;
    color:#aaa;
}

.left-menu span:hover{
    color:white;
}

.notice{
    font-size:12px;
    color:#666;
}

.container{
    width:90%;
    max-width:800px;
    margin:20px auto;
}

.post{
    background:var(--card);
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    border:1px solid var(--line);
}

.post-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.content{
    white-space:pre-wrap;
    margin:15px 0;
    line-height:1.6;
}

.actions{
    display:flex;
    gap:10px;
}

button{
    background:#333;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
}

button:disabled{
    opacity:0.5;
}

.btn-like{
    background:#e63946;
}

.btn-dislike{
    background:#457b9d;
}

.write-btn{
    position:fixed;
    right:30px;
    bottom:30px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:var(--accent);
    font-size:30px;
}

.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    z-index:200;
}

.modal{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

.modal input,.modal textarea{
    width:100%;
    background:#111;
    border:1px solid #444;
    color:white;
    padding:10px;
    margin:10px 0;
}

.modal textarea{
    height:150px;
    resize:none;
}
</style>
</head>
<body>

<header>
    <div style="display:flex;align-items:center;">
        <div class="logo" onclick="location.reload()">ITDA</div>
        <div class="left-menu">
            <span onclick="changeMode('home')">홈</span>
            <span onclick="changeMode('best')">실베</span>
        </div>
    </div>
    <div class="notice">운영자: 신가람</div>
</header>

<div class="container" id="postsContainer"></div>

<button class="write-btn" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>새 글 작성</h3>
        <input id="title" maxlength="80" placeholder="제목">
        <textarea id="content" maxlength="1000" placeholder="내용"></textarea>
        <button style="width:100%;background:#007bff;" id="submitBtn" onclick="addPost()">등록</button>
    </div>
</div>

<script>
const supabaseUrl='https://cnwdrfwnsxyfrtzvhwha.supabase.co';
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNud2RyZnduc3h5ZnJ0enZod2hhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDg1MzgsImV4cCI6MjA5MDE4NDUzOH0.yX27wbbPTmLCipFk-WEPGFQoc8IP5mdegzZRN4b9J4g';

const { createClient } = supabase;
const db = createClient(supabaseUrl,supabaseKey);

let mode="home";
let voted=JSON.parse(localStorage.getItem("voted")||"{}");

if(!localStorage.getItem("userIP")){
    localStorage.setItem("userIP","익명"+Math.floor(Math.random()*999999));
}
const userIP=localStorage.getItem("userIP");

function escapeHTML(str){
    if(!str) return "";
    return String(str).replace(/[&<>"']/g,m=>({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
    })[m]);
}

function openModal(){
    document.getElementById("modalOverlay").style.display="block";
}

function closeModal(){
    document.getElementById("modalOverlay").style.display="none";
}

async function addPost(){
    const title=document.getElementById("title").value.trim();
    const content=document.getElementById("content").value.trim();
    const submitBtn=document.getElementById("submitBtn");

    if(title.length<1 || content.length<1){
        alert("내용 입력");
        return;
    }

    if(title.length>80 || content.length>1000){
        alert("글자수 초과");
        return;
    }

    submitBtn.disabled=true;

    const { error } = await db.from('posts').insert([{
        title,
        content,
        nickname:`ㅇㅇ(${userIP})`,
        likes:0,
        dislikes:0
    }]);

    submitBtn.disabled=false;

    if(error){
        console.log(error);
        alert("등록 실패");
        return;
    }

    document.getElementById("title").value="";
    document.getElementById("content").value="";
    closeModal();
    loadPosts();
}

async function vote(id,type){
    if(voted[id]){
        alert("이미 참여함");
        return;
    }

    const { data,error } = await db
        .from('posts')
        .select('*')
        .eq('id',id)
        .single();

    if(error || !data){
        alert("오류");
        return;
    }

    const updateData = type==="up"
        ? {likes:data.likes+1}
        : {dislikes:data.dislikes+1};

    const { error:updateError } = await db
        .from('posts')
        .update(updateData)
        .eq('id',id);

    if(updateError){
        alert("실패");
        return;
    }

    voted[id]=true;
    localStorage.setItem("voted",JSON.stringify(voted));
    loadPosts();
}

function changeMode(m){
    mode=m;
    loadPosts();
}

async function loadPosts(){
    const { data,error } = await db
        .from('posts')
        .select('*')
        .order('id',{ascending:false});

    const container=document.getElementById("postsContainer");
    container.innerHTML="";

    if(error){
        container.innerHTML="<p>불러오기 실패</p>";
        console.log(error);
        return;
    }

    if(!data || data.length===0){
        container.innerHTML="<p>게시글 없음</p>";
        return;
    }

    const posts = mode==="best"
        ? data.filter(p=>p.likes>=10)
        : data;

    posts.forEach(post=>{
        const div=document.createElement("div");
        div.className="post";

        const title=escapeHTML(post.title);
        const content=escapeHTML(post.content);
        const nickname=escapeHTML(post.nickname);

        div.innerHTML=`
            <div class="post-header">
                <strong>${title}</strong>
                <div>${nickname}</div>
            </div>

            <div class="content">${content}</div>

            <div class="actions">
                <button class="btn-like" onclick="vote(${post.id},'up')">추천 ${post.likes}</button>
                <button class="btn-dislike" onclick="vote(${post.id},'down')">비추 ${post.dislikes}</button>
            </div>
        `;

        container.appendChild(div);
    });
}

loadPosts();
</script>

</body>
</html>
