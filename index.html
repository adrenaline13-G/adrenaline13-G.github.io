<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDA - 잇다</title>
    <link rel="icon" href="./favicon.png">

    <style>
        :root {
            --bg-color:#111;
            --card-bg:#1a1a1a;
            --text:#eee;
        }

        body {
            margin:0;
            background:var(--bg-color);
            color:var(--text);
            font-family:sans-serif;
        }

        header{
            background:#000;
            padding:15px 5%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #333;
            position:sticky;
            top:0;
            z-index:100;
        }

        .logo{
            font-size:24px;
            font-weight:900;
            cursor:pointer;
        }

        .left-menu{
            display:flex;
            gap:20px;
            margin-left:30px;
        }

        .left-menu span{
            cursor:pointer;
            color:#aaa;
        }

        .container{
            width:90%;
            max-width:800px;
            margin:20px auto;
            padding-bottom:100px;
        }

        .post{
            background:#1a1a1a;
            padding:20px;
            margin-bottom:20px;
            border-radius:12px;
            border:1px solid #333;
        }

        .post-header{
            display:flex;
            justify-content:space-between;
            border-bottom:1px solid #222;
            padding-bottom:10px;
        }

        .content{
            white-space:pre-wrap;
            margin:15px 0;
        }

        .actions{
            display:flex;
            gap:10px;
        }

        button{
            background:#333;
            color:white;
            border:none;
            padding:6px 12px;
            border-radius:6px;
            cursor:pointer;
        }

        .btn-like{ background:#e63946; }
        .btn-dislike{ background:#457b9d; }

        .write-btn{
            position:fixed;
            right:25px;
            bottom:25px;
            width:60px;
            height:60px;
            border-radius:50%;
            font-size:30px;
            background:#007bff;
        }

        .modal-overlay{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.8);
            z-index:200;
        }

        .modal{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:#222;
            padding:25px;
            border-radius:15px;
            width:90%;
            max-width:400px;
        }

        .modal input,.modal textarea{
            width:100%;
            background:#111;
            border:1px solid #444;
            color:white;
            padding:10px;
            margin:10px 0;
            box-sizing:border-box;
            border-radius:5px;
        }

        .modal textarea{
            height:150px;
            resize:none;
        }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <div class="logo" onclick="location.reload()">ITDA</div>

        <div class="left-menu">
            <span onclick="changeMode('home')">홈</span>
            <span onclick="changeMode('best')">실베</span>
        </div>
    </div>

    <div style="font-size:12px; color:#666;">
        운영자: 신가람
    </div>
</header>

<div class="container" id="postsContainer"></div>

<button class="write-btn" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>새 글 작성</h3>

        <input id="title" placeholder="제목">

        <textarea id="content" placeholder="내용"></textarea>

        <button style="width:100%;" onclick="addPost()">등록하기</button>
    </div>
</div>

<script>
const supabaseUrl = 'https://cnwdrfwnsxyfrtzvhwha.supabase.co';
const supabaseKey = 'sb_publishable_8CIYRr0gdJLbsPmbQFJVGA_PRzGL4_h';

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let mode = "home";
let voted = JSON.parse(localStorage.getItem("voted")) || {};

if(!localStorage.getItem("userIP")){
    localStorage.setItem("userIP", Math.floor(Math.random()*9999));
}
const userIP = localStorage.getItem("userIP");

function escapeHTML(str){
    if(!str) return "";
    return str.replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
    })[m]);
}

function openModal(){
    document.getElementById("modalOverlay").style.display="block";
}

function closeModal(){
    document.getElementById("modalOverlay").style.display="none";
}

async function addPost(){
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();

    if(!title || !content){
        alert("내용 입력");
        return;
    }

    await supabase.from('posts').insert([{
        title,
        content,
        nickname:`ㅇㅇ(${userIP})`,
        likes:0,
        dislikes:0
    }]);

    document.getElementById("title").value="";
    document.getElementById("content").value="";

    closeModal();
    loadPosts();
}

async function vote(id,type,count){
    if(voted[id]){
        alert("이미 참여함");
        return;
    }

    if(type==="up"){
        await supabase.from('posts')
            .update({likes:count+1})
            .eq('id',id);
    }else{
        await supabase.from('posts')
            .update({dislikes:count+1})
            .eq('id',id);
    }

    voted[id]=true;
    localStorage.setItem("voted",JSON.stringify(voted));

    loadPosts();
}

async function deletePost(id){
    await supabase.from('posts')
        .delete()
        .eq('id',id);

    loadPosts();
}

function changeMode(m){
    mode=m;
    loadPosts();
}

async function loadPosts(){
    const { data } = await supabase
        .from('posts')
        .select('*')
        .order('id',{ascending:false});

    const container=document.getElementById("postsContainer");
    container.innerHTML="";

    const displayPosts = mode==="best"
        ? data.filter(p=>p.likes>=10)
        : data;

    displayPosts.forEach(post=>{
        const div=document.createElement("div");
        div.className="post";

        div.innerHTML=`
            <div class="post-header">
                <strong>${escapeHTML(post.title)}</strong>
                <div>${post.nickname}</div>
            </div>

            <div class="content">${escapeHTML(post.content)}</div>

            <div class="actions">
                <button class="btn-like" onclick="vote(${post.id},'up',${post.likes})">추천 ${post.likes}</button>
                <button class="btn-dislike" onclick="vote(${post.id},'down',${post.dislikes})">비추 ${post.dislikes}</button>
                ${localStorage.getItem("isAdmin") ? `<button onclick="deletePost(${post.id})">삭제</button>` : ""}
            </div>
        `;

        container.appendChild(div);
    });
}

loadPosts();
</script>

</body>
</html>
