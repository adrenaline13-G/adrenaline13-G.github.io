<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>잇다</title>
<link rel="icon" href="./favicon.png">

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}
header{
    background:black;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
}

header div:first-child{
    font-size:30px;
}

.notice{
    max-width:400px;
    text-align:right;
}
.container{
    width:80%;
    margin:20px auto;
}
.post{
    background:#1a1a1a;
    padding:20px;
    margin-bottom:15px;
    border-radius:10px;
}
.blue{
    background:#1d3557;
}
button{
    cursor:pointer;
}
.write-btn{
    position:fixed;
    right:30px;
    bottom:30px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    font-size:30px;
}
.modal{
    display:none;
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:20px;
    border-radius:10px;
}
input, textarea{
    width:300px;
    margin:10px 0;
}
.comment{
    margin-top:10px;
    padding:10px;
    background:#222;
    border-radius:5px;
}

.left-menu{
    display:flex;
    gap:20px;
    font-size:18px;
}

.left-menu span{
    cursor:pointer;
}

.left-menu span:last-child{
    color:gray;
}

</style>
</head>
<body>

<header>
    <div class="left-menu">
        <span onclick="showHome()">홈</span>
        <span onclick="showBest()">실베</span>
    </div>

    <div>ITDA</div>

    <div class="notice">설립자:신가람 운영자 재량으로 경고없이 게시물이 삭제될수있습니다.</div>
</header>

<div class="container" id="posts"></div>

<button class="write-btn" onclick="openModal()">+</button>

<div class="modal" id="modal">
    <input id="title" placeholder="제목"><br>
    <textarea id="content" placeholder="내용"></textarea><br>
    <button onclick="addPost()">등록</button>
</div>


<script>
let mode = "home";
let isAdmin = localStorage.getItem("isAdmin") || false;
let posts = JSON.parse(localStorage.getItem("posts")) || [];

let userIP = localStorage.getItem("userIP");
if(!userIP){
    userIP = Math.floor(Math.random()*900+100)+"."+Math.floor(Math.random()*900+100);
    localStorage.setItem("userIP", userIP);
}

let voted = JSON.parse(localStorage.getItem("voted")) || {};

function randomNick(){
    if(isAdmin) return "운영자";
    return "ㅇㅇ(" + userIP + ")";
}

function save(){
    localStorage.setItem("posts", JSON.stringify(posts));
    localStorage.setItem("voted", JSON.stringify(voted));
}

function openModal(){
    document.getElementById("modal").style.display="block";
}

function addPost(){
    const title=document.getElementById("title").value;
    const content=document.getElementById("content").value;

    posts.unshift({
        title,
        content,
        nick:randomNick(),
        likes:0,
        dislikes:0,
        comments:[]
    });

    save();
    render();
    document.getElementById("modal").style.display="none";
}

function likePost(i){
    if(voted["post"+i]) return;

    posts[i].likes++;
    voted["post"+i]=true;

    save();
    render();
}


function dislikePost(i){
    if(voted["post"+i]) return;

    posts[i].dislikes++;
    voted["post"+i]=true;

    save();
    render();
}

function addComment(i){
    const text=document.getElementById("commentInput"+i).value;

    posts[i].comments.push({
        text,
        nick:randomNick(),
        likes:0,
        dislikes:0
    });

    save();
    render();
}

function likeComment(i,j){
    if(voted["comment"+i+"-"+j]) return;

    posts[i].comments[j].likes++;
    voted["comment"+i+"-"+j]=true;

    save();
    render();
}

function dislikeComment(i,j){
    if(voted["comment"+i+"-"+j]) return;

    posts[i].comments[j].dislikes++;
    voted["comment"+i+"-"+j]=true;

    save();
    render();

    function deletePost(i){
    posts.splice(i,1);
    save();
    render();

    function showHome(){
    mode="home";
    render();
    }

    function showBest(){
    mode="best";
    render();
    }
}

}

function render(){
    const container=document.getElementById("posts");
    container.innerHTML="";

    posts.forEach((post,i)=>{
    if(mode==="best" && post.likes < 10) return;
        const div=document.createElement("div");
        div.className="post"+(post.likes>=10?" blue":"");

        div.innerHTML=`
            <h2>${post.title}</h2>
            <p>${post.content}</p>
            <small style="color:${post.nick==='운영자'?'orange':'white'}">${post.nick}</small><br>
            <button onclick="likePost(${i})">추천 ${post.likes}</button>
            <button onclick="dislikePost(${i})">비추천 ${post.dislikes}</button>
            ${isAdmin ? `<button onclick="deletePost(${i})">삭제</button>` : ""}
            

            <div>
                <input id="commentInput${i}" placeholder="댓글쓰기">
                <button onclick="addComment(${i})">등록</button>
            </div>

            ${post.comments.map((c,j)=>`
                <div class="comment">
                    ${c.text}<br>
                    <small style="color:${c.nick==='운영자'?'orange':'white'}">${c.nick}</small>
                    <button onclick="likeComment(${i},${j})">추천 ${c.likes}</button>
                    <button onclick="dislikeComment(${i},${j})">비추천 ${c.dislikes}</button>
                </div>
            `).join("")}
        `;

        container.appendChild(div);
    });
}



render();
</script>


</body>
</html>
render();
</script>

</body>
</html>
